<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="clio Workbench">
  <title>clio Workbench</title>
  <defs>
    <!-- Cyan -> Pink, the clio signature sweep -->
    <linearGradient id="muse" x1="14" y1="12" x2="50" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="cosmos" cx="50%" cy="34%" r="78%">
      <stop offset="0" stop-color="#0c1430"/>
      <stop offset="0.6" stop-color="#070a18"/>
      <stop offset="1" stop-color="#04060f"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark cosmos tile -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#cosmos)" stroke="#1b2c4a" stroke-width="1.5"/>

  <!-- Starfield -->
  <g fill="#dcecff">
    <circle cx="14" cy="16" r="0.9" opacity="0.9"/>
    <circle cx="50" cy="20" r="0.7" opacity="0.7"/>
    <circle cx="20" cy="48" r="0.8" opacity="0.8"/>
    <circle cx="45" cy="46" r="0.6" opacity="0.6"/>
    <circle cx="33" cy="11" r="0.6" opacity="0.5"/>
  </g>

  <!-- Clio "C" monogram, open to the right -->
  <path d="M 42.9 18.9 A 17 17 0 1 0 42.9 45.1"
        fill="none" stroke="url(#muse)" stroke-width="6.5"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Vierzack-Funkeln: four-point sparkle at the C's opening -->
  <path d="M 46 13.5 Q 47.6 18.4 52.5 20 Q 47.6 21.6 46 26.5 Q 44.4 21.6 39.5 20 Q 44.4 18.4 46 13.5 Z"
        fill="#fbe7f4" filter="url(#glow)"/>
  <!-- Smaller spark -->
  <path d="M 49 44 Q 49.8 46.4 52.2 47.2 Q 49.8 48 49 50.4 Q 48.2 48 45.8 47.2 Q 48.2 46.4 49 44 Z"
        fill="#22d3ee" opacity="0.9"/>
</svg>
