{{define "connection.html" -}}
<span class="pill pill-{{.Status}}"
      title="{{.Detail}}{{if .ClioURL}} · {{.ClioURL}}{{end}}{{if .LatencyMS}} · {{.LatencyMS}}ms{{end}}{{if .HasInfo}} · {{thousands .EventsTotal}} events in store{{end}}">
  <span class="pill-dot" aria-hidden="true"></span>{{.Label}}{{if .ClioURL}} · {{.ClioURL}}{{end}}{{if .HasInfo}} · {{thousands .EventsTotal}} ev{{end}}
</span>
{{if .LimitHit}}<span class="limit-warn" title="Clio holds {{thousands .EventsTotal}} events, but the limit loads only {{thousands .Limit}} — the newest {{thousands .NotLoaded}} are not loaded. Raise the limit (environment limit or WORKBENCH_EVENT_CAP).">⚠ loaded {{thousands .Limit}} of {{thousands .EventsTotal}}</span>{{end}}
<button class="reconnect" type="button"
        hx-get="/connection"
        hx-target="#connection-slot"
        hx-swap="innerHTML"
        title="Re-check connection to Clio"
        aria-label="Reconnect">⟳</button>
{{- end}}
